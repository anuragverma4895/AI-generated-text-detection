<!DOCTYPE html>
<html>
<head>
  <title>Icon Generator — AI Text Detector</title>
  <style>
    body { font-family: system-ui; background: #111; color: #eee; display: flex; flex-direction: column; align-items: center; gap: 20px; padding: 40px; }
    h1 { font-size: 22px; }
    .icons { display: flex; gap: 30px; align-items: end; }
    .icon-group { text-align: center; }
    .icon-group span { display: block; margin-top: 8px; font-size: 12px; color: #888; }
    canvas { border: 1px solid #333; border-radius: 8px; }
    button { margin-top: 20px; padding: 12px 24px; background: #7c3aed; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 14px; }
    button:hover { background: #6d28d9; }
    .instructions { max-width: 500px; color: #999; font-size: 13px; text-align: center; line-height: 1.8; }
  </style>
</head>
<body>
  <h1>🛡️ Generate Extension Icons</h1>
  <div class="icons">
    <div class="icon-group">
      <canvas id="c128" width="128" height="128"></canvas>
      <span>128×128</span>
    </div>
    <div class="icon-group">
      <canvas id="c48" width="48" height="48"></canvas>
      <span>48×48</span>
    </div>
    <div class="icon-group">
      <canvas id="c16" width="16" height="16"></canvas>
      <span>16×16</span>
    </div>
  </div>
  <button onclick="downloadAll()">⬇️ Download All Icons</button>
  <p class="instructions">
    Click the button above to download all three icons.<br>
    Place them in the <code>icons/</code> folder of the extension.
  </p>

  <script>
    function drawIcon(canvas, size) {
      const ctx = canvas.getContext("2d");
      const s = size;

      // Background gradient
      const bgGrad = ctx.createLinearGradient(0, 0, s, s);
      bgGrad.addColorStop(0, "#7c3aed");
      bgGrad.addColorStop(1, "#3b82f6");

      // Rounded rectangle background
      const r = s * 0.2;
      ctx.beginPath();
      ctx.moveTo(r, 0);
      ctx.lineTo(s - r, 0);
      ctx.quadraticCurveTo(s, 0, s, r);
      ctx.lineTo(s, s - r);
      ctx.quadraticCurveTo(s, s, s - r, s);
      ctx.lineTo(r, s);
      ctx.quadraticCurveTo(0, s, 0, s - r);
      ctx.lineTo(0, r);
      ctx.quadraticCurveTo(0, 0, r, 0);
      ctx.closePath();
      ctx.fillStyle = bgGrad;
      ctx.fill();

      // Shield shape
      ctx.save();
      ctx.translate(s / 2, s * 0.48);
      const shieldW = s * 0.36;
      const shieldH = s * 0.44;
      ctx.beginPath();
      ctx.moveTo(0, -shieldH / 2);
      ctx.quadraticCurveTo(shieldW / 2, -shieldH / 2.5, shieldW / 2, -shieldH / 6);
      ctx.lineTo(shieldW / 2, shieldH / 6);
      ctx.quadraticCurveTo(shieldW / 2, shieldH / 2.5, 0, shieldH / 2);
      ctx.quadraticCurveTo(-shieldW / 2, shieldH / 2.5, -shieldW / 2, shieldH / 6);
      ctx.lineTo(-shieldW / 2, -shieldH / 6);
      ctx.quadraticCurveTo(-shieldW / 2, -shieldH / 2.5, 0, -shieldH / 2);
      ctx.closePath();
      ctx.fillStyle = "rgba(255, 255, 255, 0.2)";
      ctx.fill();
      ctx.strokeStyle = "rgba(255, 255, 255, 0.5)";
      ctx.lineWidth = Math.max(1, s * 0.015);
      ctx.stroke();

      // Checkmark inside shield
      ctx.beginPath();
      const cx = 0, cy = 0;
      const checkSize = s * 0.12;
      ctx.moveTo(cx - checkSize, cy);
      ctx.lineTo(cx - checkSize / 3, cy + checkSize * 0.7);
      ctx.lineTo(cx + checkSize, cy - checkSize * 0.6);
      ctx.strokeStyle = "white";
      ctx.lineWidth = Math.max(1.5, s * 0.025);
      ctx.lineCap = "round";
      ctx.lineJoin = "round";
      ctx.stroke();

      ctx.restore();

      // "AI" text at top
      ctx.fillStyle = "rgba(255, 255, 255, 0.9)";
      ctx.font = `bold ${Math.max(6, s * 0.14)}px system-ui`;
      ctx.textAlign = "center";
      ctx.textBaseline = "top";
      ctx.fillText("AI", s / 2, s * 0.08);

      // Subtle glow
      const glowGrad = ctx.createRadialGradient(s * 0.4, s * 0.3, 0, s * 0.4, s * 0.3, s * 0.5);
      glowGrad.addColorStop(0, "rgba(167, 139, 250, 0.15)");
      glowGrad.addColorStop(1, "transparent");
      ctx.fillStyle = glowGrad;
      ctx.fillRect(0, 0, s, s);
    }

    // Draw all icons
    [128, 48, 16].forEach(size => {
      drawIcon(document.getElementById("c" + size), size);
    });

    function downloadAll() {
      [128, 48, 16].forEach(size => {
        const canvas = document.getElementById("c" + size);
        const link = document.createElement("a");
        link.download = `icon${size}.png`;
        link.href = canvas.toDataURL("image/png");
        link.click();
      });
    }
  </script>
</body>
</html>
