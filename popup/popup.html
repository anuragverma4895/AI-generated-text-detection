<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Text Detector</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <!-- Header -->
    <header class="popup-header">
      <div class="header-brand">
        <div class="brand-icon">
          <svg viewBox="0 0 24 24" fill="white" width="20" height="20">
            <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm-2 16l-4-4 1.41-1.41L10 14.17l6.59-6.59L18 9l-8 8z"/>
          </svg>
        </div>
        <div class="brand-text">
          <h1>AI Text Detector</h1>
          <span class="brand-sub">ELECTRA-Powered Analysis</span>
        </div>
      </div>
      <div class="header-status" id="connection-status">
        <span class="status-dot"></span>
        <span class="status-text">Online</span>
      </div>
    </header>

    <!-- Input Section -->
    <section class="input-section">
      <div class="input-label">
        <svg viewBox="0 0 24 24" fill="currentColor" width="14" height="14">
          <path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/>
        </svg>
        Paste or type your text below
      </div>
      <textarea
        id="text-input"
        placeholder="Enter text to analyze for AI-generated content...&#10;&#10;Tip: You can also select text on any webpage and use the floating check button, or use the side panel to scan entire pages."
        rows="8"
      ></textarea>
      <div class="input-meta">
        <span id="char-count">0 characters</span>
        <span id="word-count">0 words</span>
      </div>
    </section>

    <!-- Analyze Button -->
    <button class="analyze-btn" id="analyze-btn">
      <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18">
        <path d="M3 5v4h2V5h4V3H5C3.9 3 3 3.9 3 5zm2 10H3v4c0 1.1.9 2 2 2h4v-2H5v-4zm14 4h-4v2h4c1.1 0 2-.9 2-2v-4h-2v4zm0-16h-4v2h4v4h2V5c0-1.1-.9-2-2-2zM12 6c-3.31 0-6 2.69-6 6s2.69 6 6 6 6-2.69 6-6-2.69-6-6-6zm0 10c-2.21 0-4-1.79-4-4s1.79-4 4-4 4 1.79 4 4-1.79 4-4 4z"/>
      </svg>
      <span>Analyze Text</span>
    </button>

    <!-- Result Section -->
    <section class="result-section" id="result-section" style="display: none;">
      <!-- Main Gauge -->
      <div class="result-gauge">
        <div class="gauge-visual">
          <svg viewBox="0 0 120 120" class="gauge-svg">
            <circle class="gauge-bg" cx="60" cy="60" r="52" />
            <circle class="gauge-fill" id="popup-gauge-fill" cx="60" cy="60" r="52" />
          </svg>
          <div class="gauge-center">
            <span class="gauge-percent" id="popup-percent">0</span>
            <span class="gauge-unit">%</span>
          </div>
        </div>
        <div class="gauge-info">
          <div class="gauge-verdict" id="popup-verdict">Analyzing...</div>
          <div class="gauge-segments" id="popup-segments"></div>
        </div>
      </div>

      <!-- Breakdown Bars -->
      <div class="result-bars">
        <div class="bar-row">
          <span class="bar-icon">🤖</span>
          <span class="bar-name">AI-Generated</span>
          <div class="bar-track">
            <div class="bar-fill bar-ai" id="popup-bar-ai"></div>
          </div>
          <span class="bar-val" id="popup-bar-ai-val">0%</span>
        </div>
        <div class="bar-row">
          <span class="bar-icon">✍️</span>
          <span class="bar-name">Human-Written</span>
          <div class="bar-track">
            <div class="bar-fill bar-human" id="popup-bar-human"></div>
          </div>
          <span class="bar-val" id="popup-bar-human-val">0%</span>
        </div>
      </div>
    </section>

    <!-- Loading State -->
    <div class="loading-state" id="loading-state" style="display: none;">
      <div class="loader-ring"></div>
      <div class="loader-text" id="loader-text">Analyzing text...</div>
    </div>

    <!-- Error State -->
    <div class="error-state" id="error-state" style="display: none;">
      <div class="error-icon">⚠️</div>
      <div class="error-text" id="error-text">Something went wrong.</div>
    </div>

    <!-- Footer -->
    <footer class="popup-footer">
      <span>Powered by ELECTRA Model</span>
      <span class="footer-dot">•</span>
      <span>v1.0.0</span>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
